# Point the server at this file with CONFIG=config.yaml (the default path).

# Where the HTTP/WebSocket server listens. Both fields are optional; omit `bind` entirely to
# keep the loopback-only default (127.0.0.1:8080). The BIND / PORT env vars override this.
bind:
  interface: "127.0.0.1"   # IP to bind: 127.0.0.1 (loopback) or 0.0.0.0 to expose on the LAN
  port: 8080

# TLS / HTTPS. Omit this section (or set `enabled: false`) to serve plain HTTP (the default).
# Serving over HTTPS provides a "secure context" so service workers work from any host, not just
# localhost. The TLS / TLS_CERT / TLS_KEY / TLS_HOSTNAMES env vars override these fields.
tls:
  enabled: false
  # With both `cert` and `key` set, those PEM files are used. With neither, the server generates a
  # fresh self-signed certificate at startup, covering localhost / 127.0.0.1 / ::1 plus the
  # `hostnames` below.
  # cert: "cert.pem"   # PEM certificate chain
  # key:  "key.pem"    # PEM private key
  #
  # Extra SAN entries (IPs / domains) for the auto-generated cert — add the address you actually
  # reach the server on so the browser's cert check matches. Ignored when cert/key are supplied.
  # hostnames: ["103.78.1.236", "proxy.example.com"]
  #
  # The auto-generated cert is self-signed and DEV ONLY: it is regenerated on every start, so
  # browsers show a certificate warning and it offers no protection against a man-in-the-middle.
  # You must import it as a trusted root on each device (and re-import after a restart). For any
  # real deployment, supply your own cert + key above (e.g. from Let's Encrypt).

# Routes selectable from the UI. `direct` (no proxy) always exists implicitly.
routes:
  # Cloudflare WARP, registered in-process (one binary, no warp-cli):
  - name: warp
    type: warp

  # A generic WireGuard peer you configure yourself (e.g. wgcf-generated):
  # - name: myvpn
  #   type: wireguard
  #   private_key: "<base64 private key>"
  #   peer_public_key: "<base64 peer public key>"
  #   endpoint: "engage.cloudflareclient.com:2408"
  #   address: "172.16.0.2/32"

  # Built-in Tor, running in-process (embedded arti-client — no external tor/arti daemon).
  # Reaches clearnet and .onion. Startup is not blocked on Tor; the first request after boot
  # may wait while the Tor directory bootstraps.
  - name: tor
    type: tor
    # data_dir: "arti-data"   # where arti caches consensus + keys (default: arti-data)

  # An external SOCKS5 upstream (e.g. your own Tor daemon, or any SOCKS5 proxy):
  - name: socks
    type: socks5
    address: "127.0.0.1:9050"

  # An HTTP CONNECT proxy (optional credentials):
  - name: corp
    type: http
    address: "127.0.0.1:8080"
    # username: "u"
    # password: "p"

# DNS resolution for the `direct` route only (socks5 / http / wireguard / tor routes resolve at
# their own exit, so the UI's DNS picker doesn't affect them). The picker sends the chosen name
# to the server as a path segment; the server resolves the target hostname with that resolver.
#
# Built-in resolvers, always present even without this section:
#   system      the OS resolver (getaddrinfo) — the default, unchanged behavior
#   cloudflare  DNS-over-HTTPS to Cloudflare  (1.1.1.1)
#   google      DNS-over-HTTPS to Google      (8.8.8.8)
#   quad9       DNS-over-HTTPS to Quad9       (9.9.9.9)
#
# Add custom DoH resolvers and/or change the preselected default:
# dns:
#   default: cloudflare          # which resolver is preselected (default: system)
#   resolvers:
#     - name: adguard
#       addresses: ["94.140.14.14", "94.140.15.15"]   # IP(s) of the DoH endpoint
#       url: "https://dns.adguard-dns.com/dns-query"   # DoH endpoint URL
#       # sni: "dns.adguard-dns.com"   # optional TLS server name; defaults to the host in `url`
