<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browser Proxy</title>
    <link rel="icon" href="data:," />

    <!-- Scramjet client + bare-mux (expose $scramjetLoadController / BareMux globals) -->
    <script src="/scram/scramjet.all.js"></script>
    <script src="/baremux/index.js"></script>

    <link rel="stylesheet" href="/style.css" />
    <script src="/register-sw.js" defer></script>
    <script src="/search.js" defer></script>
    <script src="/index.js" defer></script>
  </head>
  <body>
    <!-- Slim top bar: URL input, always available for navigating to a new site. -->
    <header id="bar">
      <form id="proxy-form" autocomplete="off">
        <input
          id="proxy-address"
          type="text"
          inputmode="url"
          placeholder="Type a URL (example.com) or a search query"
          aria-label="URL to proxy"
          autofocus
        />
        <select id="proxy-route" aria-label="Route" hidden></select>
        <button type="submit">Go</button>
      </form>
      <span id="proxy-status" class="status"></span>
    </header>

    <!-- Landing shown before the first navigation. -->
    <section id="landing">
      <h1>Browser Proxy</h1>
      <p>Type any URL above and browse it through this server.</p>
      <p id="proxy-error" class="error"></p>
      <pre id="proxy-error-code" class="error-code"></pre>
    </section>

    <!-- The proxied site renders in this full-viewport frame. -->
    <main id="frame-host"></main>

    <!-- Transient hint shown when the bar hides. -->
    <div id="hint">Nhấn <kbd>Esc</kbd> để ẩn/hiện thanh địa chỉ</div>
  </body>
</html>
